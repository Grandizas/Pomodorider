name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # These come from repo Settings → Secrets and variables → Actions.
    # Required secrets:
    #   FONT_AWESOME_TOKEN  – FontAwesome Pro registry auth. The tracked
    #                         .npmrc expands ${FONT_AWESOME_TOKEN}, so `npm ci`
    #                         can install the @fortawesome/pro-* packages.
    #   SUPABASE_URL        – test project URL (e.g. https://<ref>.supabase.co)
    #   SUPABASE_KEY        – test project anon/public key
    # @nuxtjs/supabase reads SUPABASE_URL/SUPABASE_KEY from the env, and the
    # `nuxt dev` server Playwright starts inherits them — so we don't need a
    # .env.test file in CI (it's gitignored). This mirrors `npm test` locally.
    env:
      FONT_AWESOME_TOKEN: ${{ secrets.FONT_AWESOME_TOKEN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      # Run playwright directly (not `npm test`): env is already injected above,
      # so we skip the dotenv `.env.test` indirection that doesn't exist in CI.
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
